<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f5f7" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/img/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="assets/img/icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="ANIMA" />
  <title>Panel del Fundador — ANIMA</title>
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="assets/css/umbral.css" />
  <style>
    body.rite{display:block;align-items:stretch;justify-content:flex-start}
    .f-wrap{position:relative;z-index:2;width:100%;max-width:920px;margin:0 auto;padding:30px 20px 70px}
    .f-top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px}
    .f-brand{display:flex;align-items:center;gap:10px;font-weight:850;font-size:18px}
    .f-brand svg{width:22px;height:22px}
    .f-back{font-size:13px;color:var(--gold-deep);text-decoration:none;font-weight:700}
    h1.f-title{font-size:clamp(26px,6vw,38px);letter-spacing:-.02em;margin:18px 0 4px}
    .f-lede{color:var(--muted);font-size:14px;margin:0 0 26px}

    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}
    .card{border:1px solid var(--line);border-radius:20px;background:var(--card);padding:20px 22px;backdrop-filter:blur(6px)}
    .card h2{font-size:11px;font-weight:850;letter-spacing:.28em;text-transform:uppercase;color:var(--gold-deep);margin:0 0 16px}
    .big{font-size:40px;font-weight:850;letter-spacing:-.02em;line-height:1}
    .big .of{color:var(--muted);font-size:20px;font-weight:700}
    .row{display:flex;align-items:baseline;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line);font-size:14px}
    .row:last-child{border-bottom:0}
    .row b{font-weight:800}
    .muted{color:var(--muted)}
    .bar{height:6px;border-radius:99px;background:var(--line);overflow:hidden;margin-top:14px}
    .bar > span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--gold),var(--gold-deep));transition:width 1.2s var(--ease)}
    .dots{display:flex;flex-direction:column;gap:10px}
    .svc{display:flex;align-items:center;gap:10px;font-size:14px}
    .svc .led{width:10px;height:10px;border-radius:50%;background:#bbb;box-shadow:0 0 0 3px rgba(0,0,0,.04)}
    .svc.ok .led{background:#43a047;box-shadow:0 0 0 3px rgba(67,160,71,.16)}
    .svc.bad .led{background:#e2574c;box-shadow:0 0 0 3px rgba(226,87,76,.16)}
    .chips{display:flex;flex-wrap:wrap;gap:8px}
    .chip{border:1px solid var(--line);border-radius:99px;padding:6px 12px;font-size:13px}
    .chip b{color:var(--gold-deep)}
    .stars{color:var(--gold);font-size:18px;letter-spacing:2px}
    .gate{max-width:460px;margin:60px auto;text-align:center}
    .gate h1{font-size:24px;margin-bottom:10px}
    .gate p{color:var(--muted)}
    .cbtn.sm{padding:10px 18px;font-size:13.5px;display:inline-block;margin-top:18px}
    .foot{text-align:center;color:var(--muted);font-size:12px;margin-top:48px}
    .foot a{color:var(--gold-deep);text-decoration:none}
    .span-2{grid-column:1/-1}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase.js?v=nucleo-v2"></script>
</head>
<body class="rite">
  <div class="field"><div class="core"></div></div>

  <main class="f-wrap" id="app">
    <div class="f-top">
      <div class="f-brand">
        <svg viewBox="23 27 54 48" fill="none"><path d="M28 72 L50 30 L72 72" stroke="#111" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        ANIMA
      </div>
      <a class="f-back" href="home.html">← Volver</a>
    </div>
    <div id="body"><p class="f-lede" style="margin-top:40px">Abriendo el Panel del Fundador…</p></div>
  </main>

  <script>
  var esc=function(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});};
  function fmtBytes(n){ n=Number(n)||0; if(n<1024) return n+" B"; var u=["KB","MB","GB","TB"], i=-1; do{ n/=1024; i++; }while(n>=1024 && i<u.length-1); return (n>=10?Math.round(n):n.toFixed(1))+" "+u[i]; }
  var body=document.getElementById("body");

  function gate(msg){
    body.innerHTML='<div class="gate"><h1>Solo para el Fundador</h1><p>'+esc(msg)+'</p>'+
      '<a class="cbtn sm" href="home.html">Volver a Mi Alma</a></div>';
  }

  function svc(name, ok){
    return '<div class="svc '+(ok?"ok":"bad")+'"><span class="led"></span>'+esc(name)+
           ' <span class="muted" style="margin-left:auto">'+(ok?"🟢":"🔴")+'</span></div>';
  }

  function render(s){
    var pct=Math.min(100,Math.round((s.souls/(s.limit||100))*100));
    var countries=(s.countries||[]);
    var stars="";
    var avg=s.feedback_avg!=null?Number(s.feedback_avg):null;
    if(avg!=null){ var full=Math.round(avg); for(var i=0;i<5;i++) stars+=(i<full?"★":"☆"); }

    body.innerHTML=
      '<h1 class="f-title">Panel del Fundador</h1>'+
      '<p class="f-lede">El estado vivo de ANIMA · The Founding Era.</p>'+
      '<div class="grid">'+

        '<div class="card">'+
          '<h2>Comunidad</h2>'+
          '<div class="big">'+s.souls+' <span class="of">/ '+(s.limit||100)+'</span></div>'+
          '<div class="muted" style="font-size:13px;margin-top:6px">Almas habitando ANIMA</div>'+
          '<div class="bar"><span id="soulsBar"></span></div>'+
          '<div class="row" style="margin-top:14px"><span class="muted">Consejo de Almas</span><b>'+(s.council||0)+' / 50</b></div>'+
        '</div>'+

        '<div class="card">'+
          '<h2>Usuarios activos</h2>'+
          '<div class="row"><span class="muted">Hoy</span><b>'+(s.active_today||0)+'</b></div>'+
          '<div class="row"><span class="muted">Esta semana</span><b>'+(s.active_week||0)+'</b></div>'+
          '<div class="row"><span class="muted">Ecos emitidos</span><b>'+(s.echoes||0)+'</b></div>'+
        '</div>'+

        '<div class="card">'+
          '<h2>Obras</h2>'+
          '<div class="big">'+(s.works||0)+'</div>'+
          '<div class="muted" style="font-size:13px;margin-top:6px">Obras en portafolios</div>'+
          '<div class="row" style="margin-top:14px"><span class="muted">Espacio usado</span><b>'+fmtBytes(s.storage_bytes||0)+' / '+fmtBytes(s.storage_limit_bytes||10737418240)+'</b></div>'+
          '<div class="bar"><span id="storeBar"></span></div>'+
          ((s.storage_by_bucket||[]).length?'<div style="margin-top:12px">'+(s.storage_by_bucket||[]).map(function(b){return '<div class="row"><span class="muted">'+esc(b.bucket)+' · '+(b.files||0)+'</span><b>'+fmtBytes(b.bytes||0)+'</b></div>';}).join('')+'</div>':'')+
        '</div>'+

        '<div class="card">'+
          '<h2>Feedback</h2>'+
          (avg!=null
            ? '<div class="big">'+avg+'</div><div class="stars">'+stars+'</div>'+
              '<div class="row" style="margin-top:14px"><span class="muted">Opiniones</span><b>'+(s.feedback_n||0)+'</b></div>'
            : '<div class="muted">Aún no hay feedback.</div>')+
        '</div>'+

        '<div class="card span-2">'+
          '<h2>Países</h2>'+
          (countries.length
            ? '<div class="chips">'+countries.map(function(c){return '<span class="chip">'+esc(c.country)+' <b>'+c.n+'</b></span>';}).join("")+'</div>'
            : '<div class="muted">Todavía sin geografía.</div>')+
        '</div>'+

        '<div class="card span-2">'+
          '<h2>Estado</h2>'+
          '<div class="dots">'+
            svc("Auth", true)+
            svc("Database", true)+
            svc("Storage", window.__storageOk!==false)+
            svc("Correo", true)+
          '</div>'+
          '<div class="muted" style="font-size:12px;margin-top:14px">Auth/DB confirmados por esta sesión. Storage verificado por lectura de buckets.</div>'+
        '</div>'+

      '</div>'+
      '<div class="foot"><strong>ANIMA TSC</strong> · Panel privado del Fundador</div>';

    setTimeout(function(){ var b=document.getElementById("soulsBar"); if(b) b.style.width=Math.max(2,pct)+"%";
      var sb=document.getElementById("storeBar"); if(sb){ var sp=Math.min(100,Math.round(((s.storage_bytes||0)/(s.storage_limit_bytes||10737418240))*100)); sb.style.width=Math.max(1,sp)+"%"; } }, 200);
  }

  (async function(){
    if(typeof Cloud==="undefined" || !Cloud.enabled){ gate("No hay conexión con la nube de ANIMA."); return; }
    var session=await Cloud.session();
    if(!session){ gate("Inicia sesión como Fundador para ver este panel."); return; }
    // Comprobación suave de Storage (lectura de buckets públicos).
    try{ await Cloud.client.storage.from("avatars").list("", { limit:1 }); window.__storageOk=true; }
    catch(e){ window.__storageOk=false; }
    try{
      var s=await Cloud.founderStats();
      if(!s){ gate("No se pudo cargar el panel."); return; }
      render(s);
    }catch(e){
      gate("Solo el Fundador puede ver este panel. (" + (e && e.message ? e.message : "acceso denegado") + ")");
    }
  })();
  </script>
</body>
</html>
