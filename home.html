<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f5f7" />
  <link rel="icon" href="assets/img/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="assets/img/icon.svg" />
  <title>ANIMA</title>
  <meta name="description" content="El espacio de tu Alma en ANIMA: entra, sube de nivel y accede a tu Clan o Santuario." />
  <link rel="stylesheet" href="assets/css/umbral.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/anima-state.js"></script>
</head>
<body class="rite" style="display:block;align-items:stretch;justify-content:flex-start">
  <div class="field"><div class="core"></div></div>

  <main class="home-wrap" id="home"><!-- inyectado --></main>

  <script src="assets/js/rite.js"></script>
  <script>
  /* Si el Alma no ha despertado, vuelve al rito (req. 11). */
  if (!AnimaState.isCompleted()) { location.replace("umbral.html"); }

  var CREATOR_EMAIL = "sarkgraff@gmail.com";
  var home = document.getElementById("home");
  function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }
  var PEAK = '<svg viewBox="23 27 54 48" fill="none"><path d="M28 72 L50 30 L72 72" stroke="#111" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/></svg>';

  /* Estado de sesión/plan (se completa con la nube si hay sesión) */
  var ctx = { signedIn: false, email: "", plan: "ALMA", isCreator: false };

  function planAllows(level){
    if (ctx.isCreator) return true;
    if (level === "CLAN") return ctx.plan === "CLAN" || ctx.plan === "SANTUARIO";
    if (level === "SANTUARIO") return ctx.plan === "SANTUARIO";
    return true;
  }

  function render() {
    var s = AnimaState.get();
    var p = AnimaState.progress();
    var afn = AnimaState.affinity(s.affinity);
    var nameFirst = (s.name || "Alma").split(" ")[0];

    /* --- Cabecera con menú del Alma --- */
    var sessionChip = ctx.signedIn
      ? '<div class="alma-pill" id="almaPill"><span class="adot"></span>' + esc(nameFirst) +
        '<span class="acaret">⌄</span><div class="alma-pop" id="almaPop">' +
          '<a class="apop-item" href="studio.html">✦ Entrar a Mi Alma</a>' +
          (planAllows("CLAN") ? '<a class="apop-item" href="studio.html#go=clanpanel">❂ Mi Clan</a>' : '') +
          (planAllows("SANTUARIO") ? '<a class="apop-item" href="studio.html#go=santuario">🜁 Santuario</a>' : '') +
          '<div class="apop-sep"></div>' +
          '<button class="apop-item" id="switchAlma">⤿ Cambiar de Alma</button>' +
          '<button class="apop-item danger" id="logoutAlma">⏻ Cerrar sesión</button>' +
        '</div></div>'
      : '<a class="cbtn" href="studio.html" style="padding:10px 18px;font-size:13.5px">Entrar a mi Alma</a>';

    /* --- Tres accesos: Alma / Clan / Santuario --- */
    function entry(level, glyph, title, desc, href){
      var ok = planAllows(level);
      if (ok) return '<a class="entry open" href="' + href + '"><span class="eg">' + glyph + '</span>' +
        '<b>' + title + '</b><small>' + desc + '</small><span class="ego">Entrar →</span></a>';
      return '<div class="entry locked"><span class="lock">🔒</span><span class="eg">' + glyph + '</span>' +
        '<b>' + title + '</b><small>' + desc + '</small>' +
        '<a class="ego" href="planes.html">Desbloquear plan →</a></div>';
    }
    var entries =
      entry("ALMA", "✦", "Mi Alma", "Tu espacio privado: identidad, proyectos, memoria y portafolio.", "studio.html") +
      entry("CLAN", "❂", "Clan", "Tu equipo (2–8 Almas): agenda, clientes y memoria colectiva.", "studio.html#go=clanpanel") +
      entry("SANTUARIO", "🜁", "Santuario", "La organización (8+): múltiples Clanes y vista general.", "studio.html#go=santuario");

    home.innerHTML =
      '<div class="home-top">' +
        '<div class="home-brand"><span class="m">' + PEAK + '</span>ANIMA</div>' +
        sessionChip +
      '</div>' +

      '<div class="home-hero">' +
        '<h1>' + (ctx.signedIn ? 'Hola, ' + esc(nameFirst) + '.' : 'Bienvenida de nuevo.') + '</h1>' +
        '<p>' + (ctx.signedIn
          ? 'Tu Alma está despierta' + (afn ? ' · ' + afn.glyph + ' ' + esc(afn.name) : '') + '. Elige por dónde entrar hoy.'
          : 'Entra a tu Alma para continuar tu camino en ANIMA.') + '</p>' +
      '</div>' +

      // Resumen mínimo: nivel + esencia
      '<div class="hcard" style="margin-bottom:16px">' +
        '<div style="display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap">' +
          '<div style="display:flex;align-items:center;gap:10px">' +
            '<span class="lv-badge">' + p.level.glyph + ' ' + p.level.name.toUpperCase() + '</span>' +
            '<span class="hint" style="margin:0">Nivel ' + p.level.n + ' de 7</span></div>' +
          '<span class="hint" style="margin:0">Esencia ' + p.into + ' / ' + p.span + '</span>' +
        '</div>' +
        '<div class="ebar" style="margin-top:14px"><span data-pct="' + p.pct + '"></span></div>' +
        '<div class="hint" style="margin-top:8px">' + (p.next
          ? 'Sigue creando para despertar <b style="color:var(--gold-deep)">' + p.next.name + '</b> y desbloquear más de ANIMA.'
          : 'Has recorrido todo el camino. ∞') + '</div>' +
      '</div>' +

      // Accesos
      '<div class="entry-grid">' + entries + '</div>' +

      '<div class="home-foot">' +
        '<strong>ANIMA TSC — The Soul of Creativity</strong> · The Founding Era<br>' +
        '<a href="index.html">Inicio</a>·<a href="planes.html">Planes</a>·<a href="legal.html#privacidad">Privacidad</a><br>' +
        '<span style="opacity:.6">Tus datos son privados; tú decides qué compartir.</span>' +
      '</div>';

    var bar = home.querySelector(".ebar > span");
    if (bar) setTimeout(function () { bar.style.width = (bar.dataset.pct || 0) + "%"; }, 250);

    // Menú del Alma (abrir/cerrar + acciones)
    var pill = document.getElementById("almaPill");
    if (pill) {
      var pop = document.getElementById("almaPop");
      pill.addEventListener("click", function (e) {
        if (e.target.closest(".apop-item")) return; // dejar que los items actúen
        pop.classList.toggle("open");
      });
      document.addEventListener("click", function (e) { if (!e.target.closest("#almaPill")) pop.classList.remove("open"); });
      var sw = document.getElementById("switchAlma");
      if (sw) sw.addEventListener("click", async function () { try { await Cloud.signOut(); } catch (e) {} location.href = "studio.html"; });
      var lo = document.getElementById("logoutAlma");
      if (lo) lo.addEventListener("click", async function () { try { await Cloud.signOut(); } catch (e) {} render(); });
    }
  }

  /* Init: reconcilia con la nube (sesión/plan/esencia) y pinta una vez. */
  (async function init() {
    try {
      if (typeof Cloud !== "undefined" && Cloud.enabled) {
        var session = await Cloud.session();
        if (session) {
          ctx.signedIn = true;
          ctx.email = (session.user && session.user.email || "").toLowerCase();
          ctx.isCreator = ctx.email === CREATOR_EMAIL;
          var row = await Cloud.myAlma();
          if (row) {
            ctx.plan = row.plan || "ALMA";
            var st = AnimaState.get();
            if (row.name) st.name = row.name;
            if (row.affinity) st.affinity = row.affinity;
            AnimaState.save(st);
            await AnimaState.syncCloud(row);
          }
        }
      }
    } catch (e) {}
    render();
    if (window.Rite && Rite.pullToRefresh) Rite.pullToRefresh();
  })();
  </script>
</body>
</html>
