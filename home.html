<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f5f7" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/img/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="assets/img/icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="ANIMA" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>ANIMA — El mundo vivo de las Almas</title>
  <meta name="description" content="ANIMA es un mundo vivo habitado por Almas. Entra al HOME: el estado del mundo, tu Alma, tu Clan y tu Santuario." />
  <link rel="stylesheet" href="assets/css/umbral.css" />
  <style>
    /* HOME minimalista — mismo diseño en todo dispositivo, solo adaptado. */
    .world-line{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;
      margin-top:12px;font-size:13px;color:var(--muted)}
    .world-line .pip{width:5px;height:5px;border-radius:50%;background:var(--gold);opacity:.7}
    .soul-sleep{display:flex;align-items:center;gap:12px;padding:14px 18px;border:1px solid var(--line);
      border-radius:16px;background:linear-gradient(135deg,rgba(208,170,99,.10),transparent);margin-bottom:18px}
    .soul-sleep .moon{font-size:20px}
    .soul-sleep b{color:var(--gold-deep)}
    .home-cta{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:18px}
    @media(max-width:680px){ .home-cta .cbtn{flex:1;text-align:center} }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase.js"></script>
  <script src="assets/js/anima-state.js"></script>
</head>
<body class="rite" style="display:block;align-items:stretch;justify-content:flex-start">
  <div class="field"><div class="core"></div></div>

  <main class="home-wrap" id="home"><!-- inyectado --></main>

  <script src="assets/js/rite.js"></script>
  <script>
  /* ===========================================================
     HOME PRINCIPAL — minimalista, igual en todo dispositivo.
     Sin sesión → Almas actuales + Estado del Mundo.
     Con sesión → Tiempo que el Alma llevaba sin entrar + acceso a
                  Mi Alma / Clan / Santuario (si tienen acceso).
     =========================================================== */
  var CREATOR_EMAIL = "sarkgraff@gmail.com";
  var home = document.getElementById("home");
  function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }
  var PEAK = '<svg viewBox="23 27 54 48" fill="none"><path d="M28 72 L50 30 L72 72" stroke="#111" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/></svg>';

  /* Tiempo que el Alma llevaba sin entrar (se lee ANTES de re-sellar la hora). */
  var SLEPT = AnimaState.sleptText(AnimaState.lastSeen());

  var ctx = { signedIn: false, email: "", plan: "ALMA", isCreator: false };

  function planAllows(level){
    if (ctx.isCreator) return true;
    if (level === "CLAN") return ctx.plan === "CLAN" || ctx.plan === "SANTUARIO";
    if (level === "SANTUARIO") return ctx.plan === "SANTUARIO";
    return true;
  }

  /* Cabecera común: marca + (menú del Alma | Entrar). */
  function topBar(){
    var s = AnimaState.get();
    var nameFirst = (s.name || "Alma").split(" ")[0];
    var right = ctx.signedIn
      ? '<div class="alma-pill" id="almaPill"><span class="adot"></span>' + esc(nameFirst) +
          '<span class="acaret">⌄</span><div class="alma-pop" id="almaPop">' +
            '<a class="apop-item" href="studio.html">✦ Entrar a Mi Alma</a>' +
            (planAllows("CLAN") ? '<a class="apop-item" href="studio.html#go=clanpanel">❂ Mi Clan</a>' : '') +
            (planAllows("SANTUARIO") ? '<a class="apop-item" href="studio.html#go=santuario">🜁 Santuario</a>' : '') +
            '<div class="apop-sep"></div>' +
            '<button class="apop-item danger" id="logoutAlma">⏻ Cerrar sesión</button>' +
          '</div></div>'
      : '<a class="cbtn" href="entrar.html" style="padding:10px 18px;font-size:13.5px">Entrar a mi Alma</a>';
    return '<div class="home-top">' +
        '<div class="home-brand"><span class="m">' + PEAK + '</span>ANIMA</div>' +
        right +
      '</div>';
  }

  function foot(){
    return '<div class="home-foot">' +
        '<strong>ANIMA TSC</strong> · The Founding Era<br>' +
        '<a href="arbol.html">Árbol de Almas</a>·<a href="planes.html">Mi Plan</a>·<a href="legal.html#privacidad">Privacidad</a>' +
      '</div>';
  }

  /* ---------- Sin sesión: Almas actuales + Estado del Mundo ---------- */
  function renderGuest(){
    home.innerHTML =
      topBar() +

      '<div class="home-hero" style="text-align:center">' +
        '<h1>Un mundo está despertando.</h1>' +
        '<p style="margin-left:auto;margin-right:auto">ANIMA es un mundo vivo habitado por Almas.</p>' +
      '</div>' +

      // Estado del Mundo — Almas actuales
      '<div class="hcard" style="text-align:center">' +
        '<div class="label">Almas del Origen</div>' +
        '<div class="big" style="font-size:40px;margin-top:4px"><span id="homeSouls">·</span> <span style="color:var(--muted);font-size:20px;font-weight:700">/ 100</span></div>' +
        '<div class="ebar" style="margin-top:14px"><span id="homeSoulsBar" style="background:linear-gradient(90deg,var(--gold,#d0aa63),var(--gold-deep,#7b5920))"></span></div>' +
        '<div class="world-line"><span>Era del Origen</span><span class="pip"></span><span>El Árbol: Despertando</span></div>' +
        '<div class="hint" id="homeSoulsSub" style="margin-top:10px">El Umbral de ANIMA.</div>' +
      '</div>' +

      // Entrar / Despertar
      '<div class="home-cta">' +
        '<a class="cbtn gold" href="entrar.html" style="padding:12px 22px">Entrar a mi Alma</a>' +
        '<a class="cbtn ghost" href="umbral.html" style="padding:12px 22px">✦ Despertar una nueva Alma</a>' +
      '</div>' +

      foot();

    fillSouls();
  }

  /* ---------- Con sesión: tiempo sin entrar + accesos ---------- */
  function renderSignedIn(){
    var s = AnimaState.get();
    var nameFirst = (s.name || "Alma").split(" ")[0];

    function entry(level, glyph, title, desc, href){
      var ok = planAllows(level);
      if (ok) return '<a class="entry open" href="' + href + '"><span class="eg">' + glyph + '</span>' +
        '<b>' + title + '</b><small>' + desc + '</small><span class="ego">Entrar →</span></a>';
      return '<div class="entry locked"><span class="lock">🔒</span><span class="eg">' + glyph + '</span>' +
        '<b>' + title + '</b><small>' + desc + '</small>' +
        '<a class="ego" href="planes.html">Desbloquear plan →</a></div>';
    }
    var entries =
      entry("ALMA", "✦", "Mi Alma", "Tu espacio privado: identidad, proyectos y memoria.", "studio.html") +
      entry("CLAN", "❂", "Clan", "Tu equipo (2–8 Almas): agenda y memoria colectiva.", "studio.html#go=clanpanel") +
      entry("SANTUARIO", "🜁", "Santuario", "La organización (8+): múltiples Clanes.", "studio.html#go=santuario");

    var sleepLine = SLEPT
      ? '<div class="soul-sleep"><span class="moon">☽</span><div>Tu Alma durmió por <b>' + esc(SLEPT) + '</b>. Bienvenida de vuelta.</div></div>'
      : '';

    var sleepLine = SLEPT
      ? '<div class="soul-sleep"><span class="moon">☽</span><div>Tu Alma durmió por <b>' + esc(SLEPT) + '</b>. Bienvenida de vuelta, ' + esc(nameFirst) + '.</div></div>'
      : '';

    home.innerHTML =
      topBar() +

      '<div class="home-hero">' +
        '<h1>Hola, ' + esc(nameFirst) + '.</h1>' +
        '<p>Elige por dónde entrar hoy en ANIMA.</p>' +
      '</div>' +

      sleepLine +

      '<div class="entry-grid">' + entries + '</div>' +

      foot();

    wireAlmaMenu();
  }

  function wireAlmaMenu(){
    var pill = document.getElementById("almaPill");
    if (!pill) return;
    var pop = document.getElementById("almaPop");
    pill.addEventListener("click", function (e) {
      if (e.target.closest(".apop-item")) return;
      pop.classList.toggle("open");
    });
    document.addEventListener("click", function (e) { if (!e.target.closest("#almaPill")) pop.classList.remove("open"); });
    var lo = document.getElementById("logoutAlma");
    if (lo) lo.addEventListener("click", async function () { try { await Cloud.signOut(); } catch (e) {} ctx.signedIn = false; render(); });
  }

  function render(){ if (ctx.signedIn) renderSignedIn(); else renderGuest(); }

  /* Almas actuales — contador vivo desde la nube. */
  async function fillSouls(){
    var nEl = document.getElementById("homeSouls");
    if (!nEl) return;
    var n = 0;
    try { if (typeof Cloud !== "undefined" && Cloud.enabled) n = (await Cloud.soulsCount()) || 0; } catch (e) {}
    nEl.textContent = n;
    var sub = document.getElementById("homeSoulsSub");
    if (sub) sub.textContent = n >= 100 ? "El Umbral está completo."
      : n >= 90 ? "El Umbral está casi completo."
      : "Quedan " + (100 - n) + " lugares en ANIMA.";
    var b = document.getElementById("homeSoulsBar");
    if (b) setTimeout(function(){ b.style.width = Math.max(2, Math.round(n)) + "%"; }, 260);
  }

  /* Init: reconcilia con la nube (sesión/plan) y pinta una vez. */
  (async function init() {
    try {
      if (typeof Cloud !== "undefined" && Cloud.enabled) {
        var session = await Cloud.session();
        if (session) {
          ctx.signedIn = true;
          ctx.email = (session.user && session.user.email || "").toLowerCase();
          ctx.isCreator = ctx.email === CREATOR_EMAIL;
          var row = await Cloud.myAlma();
          if (row) {
            ctx.plan = row.plan || "ALMA";
            ctx.awakened = !!row.awakening_completed;
            var st = AnimaState.get();
            if (row.name) st.name = row.name;
            if (row.affinity) st.affinity = row.affinity;
            AnimaState.save(st);
            await AnimaState.syncCloud(row);
          }
        }
      }
    } catch (e) {}
    render();
    if (window.Rite && Rite.pullToRefresh) Rite.pullToRefresh();
  })();
  </script>
</body>
</html>
