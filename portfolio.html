<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#111111" />
  <title>Portafolio · ANIMA</title>
  <meta name="description" content="Portafolio de un Alma en ANIMA TSC." />
  <link rel="icon" href="assets/img/icon.svg" type="image/svg+xml" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/anima.css" />
  <style>
    .pf-wrap{max-width:1120px;margin:0 auto;padding:0 18px 80px}
    .pf-banner{height:240px;border-radius:0 0 28px 28px;position:relative;overflow:hidden;margin-bottom:0}
    .pf-banner img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
    .pf-banner::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent,rgba(0,0,0,.18))}
    .pf-topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:rgba(245,245,247,.8);backdrop-filter:blur(20px);border-bottom:1px solid var(--line)}
    .pf-id{display:grid;grid-template-columns:auto 1fr;gap:22px;align-items:end;margin-top:-64px;position:relative;z-index:5;padding:0 6px}
    .pf-photo{width:128px;height:128px;border-radius:32px;border:4px solid #fff;box-shadow:var(--shadow);background-size:cover;background-position:center;display:grid;place-items:center;color:#fff;font-size:46px;font-weight:850}
    .pf-id h1{font-size:clamp(30px,5vw,46px);letter-spacing:-.05em;margin:0}
    .pf-meta{color:var(--muted);margin-top:2px}
    .pf-badge{display:inline-flex;align-items:center;gap:7px;padding:6px 12px;border-radius:999px;font-weight:850;font-size:12px;border:1px solid var(--line);margin-top:8px}
    .pf-role{display:inline-flex;padding:5px 11px;border-radius:999px;background:rgba(208,170,99,.16);color:#7b5920;border:1px solid rgba(208,170,99,.3);font-weight:850;font-size:11px;letter-spacing:.04em}
    .pf-headline{font-size:16px;color:#3a3a3f;font-weight:650;margin-top:6px;letter-spacing:-.01em}
    .pf-badges{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:10px}
    .pf-avail{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;font-weight:800;font-size:12px;border:1px solid rgba(58,138,95,.32);background:rgba(58,138,95,.12);color:#2f7a52}
    .pf-avail.lim{border-color:rgba(184,134,47,.34);background:rgba(184,134,47,.14);color:#8a6420}
    .pf-avail.off{border-color:var(--line);background:rgba(0,0,0,.04);color:var(--muted)}
    .spark-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 15px;border-radius:999px;border:0;cursor:pointer;font-family:inherit;font-weight:850;font-size:12.5px;color:#fff;background:linear-gradient(135deg,#f2c64e,#d0aa63);box-shadow:0 8px 22px rgba(208,170,99,.34);transition:.18s}
    .spark-btn:hover{transform:translateY(-2px)}
    .spark-btn:disabled{cursor:default;opacity:.92}
    .spark-btn.done{background:linear-gradient(135deg,#3a8a5f,#2f7a52);box-shadow:none}
    .spark-btn.pulse{animation:sparkpulse .5s ease}
    @keyframes sparkpulse{0%{transform:scale(1)}40%{transform:scale(1.12)}100%{transform:scale(1)}}
    .pf-cols{display:grid;grid-template-columns:300px 1fr;gap:26px;margin-top:30px}
    .pf-stats{display:flex;gap:20px;flex-wrap:wrap;margin:14px 0}
    .pf-stat b{font-size:22px;letter-spacing:-.04em;display:block}.pf-stat small{color:var(--muted);font-size:11.5px}
    .pf-links a{display:flex;justify-content:space-between;padding:11px 14px;border:1px solid var(--line);border-radius:12px;margin-bottom:8px;text-decoration:none;color:#222;font-weight:700;font-size:13.5px;background:rgba(255,255,255,.6)}
    .pf-links a:hover{box-shadow:var(--shadow-soft)}
    .pf-section-t{font-size:11px;font-weight:850;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:22px 0 10px}
    .gal{columns:3;column-gap:14px}
    .gal .item{break-inside:avoid;margin-bottom:14px;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#fff;box-shadow:var(--shadow-soft);cursor:pointer;transition:.18s}
    .gal .item:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
    .gal .cv{position:relative;display:grid;place-items:center;min-height:150px;color:#fff;font-weight:850;font-size:30px;background-size:cover;background-position:center}
    .gal .cap{padding:11px 13px}.gal .cap b{font-size:14px}.gal .cap small{color:var(--muted);display:block;font-size:11.5px}
    .gal .cap p{margin:6px 0 0;font-size:12.5px;color:#4a463e}
    .theme-h{display:flex;align-items:center;gap:10px;margin:26px 0 12px}
    .theme-h h2{font-size:20px;letter-spacing:-.03em;margin:0}.theme-h .ln{flex:1;height:1px;background:var(--line)}
    .empty{max-width:520px;margin:80px auto;text-align:center;color:var(--muted)}
    .lightbox{position:fixed;inset:0;background:rgba(15,13,10,.92);display:none;place-items:center;z-index:90;padding:24px}
    .lightbox.open{display:grid}
    .lightbox img{max-width:94vw;max-height:86vh;border-radius:12px;box-shadow:0 30px 80px rgba(0,0,0,.5)}
    .lightbox .cap{position:absolute;bottom:24px;left:0;right:0;text-align:center;color:#fff}
    .lightbox .x{position:absolute;top:20px;right:24px;color:#fff;font-size:26px;cursor:pointer;background:none;border:0}
    .pixel-font{font-family:"Press Start 2P",monospace}
    .tl{position:relative;padding-left:24px}.tl::before{content:"";position:absolute;left:7px;top:6px;bottom:6px;width:2px;background:var(--line)}
    .tl .node{position:relative;padding:10px 0}.tl .node::before{content:"";position:absolute;left:-21px;top:15px;width:10px;height:10px;border-radius:50%;background:var(--gold);border:2px solid #fff;box-shadow:0 0 0 2px var(--line)}
    .tl .yr{font-size:11px;font-weight:850;color:var(--gold)}
    @media(max-width:860px){.pf-cols{grid-template-columns:1fr}.gal{columns:2}.pf-photo{width:104px;height:104px}}
    @media(max-width:540px){.gal{columns:1}}
  </style>
</head>
<body>
  <div class="pf-topbar">
    <a class="brand" href="index.html" style="text-decoration:none"><span class="mark"><svg viewBox="0 0 100 100" fill="none"><path d="M30 74 L49 31" stroke="#111" stroke-width="5.5" stroke-linecap="round"/><path d="M51 31 L70 74" stroke="#111" stroke-width="5.5" stroke-linecap="round"/><circle cx="50" cy="61" r="2.6" fill="#f2c64e"/></svg></span>ANIMA</a>
    <div style="display:flex;gap:8px">
      <button class="btn ghost sm" id="shareBtn">Compartir</button>
      <a class="btn sm" href="studio.html">Entrar a ANIMA</a>
    </div>
  </div>
  <main class="pf-wrap" id="app"><div class="empty">Cargando portafolio…</div></main>

  <div class="lightbox" id="lightbox"><button class="x" id="lbClose">✕</button><div><img id="lbImg" src="" alt=""><div class="cap" id="lbCap"></div></div></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/seed.js"></script>
  <script src="assets/js/portfolio.js"></script>
</body>
</html>
